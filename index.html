<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zine Sticker Drop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .sticker-btn { transition: transform 0.1s; }
    .sticker-btn:hover { transform: scale(1.2); }
    .sticker-btn.selected { outline: 3px solid #ec4899; outline-offset: 2px; }
    #messages { scrollbar-width: thin; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-2xl mx-auto flex flex-col h-screen">
    <!-- Header -->
    <div class="bg-zinc-900 border-b border-zinc-700 p-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">рЯУЦ Zine Sticker Drop</h1>
        <p class="text-xs text-zinc-400">Stickers only вАҐ No random names</p>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-zinc-950"></div>

    <!-- Compose -->
    <div class="bg-zinc-900 border-t border-zinc-700 p-4 space-y-4">

      <!-- Username Dropdown -->
      <div>
        <select id="username-select" class="w-full bg-zinc-800 border border-zinc-700 focus:border-pink-500 rounded-xl px-4 py-3 text-sm outline-none">
          <option value="">Choose a name...</option>
          <option value="ZineWizard">ZineWizard</option>
          <option value="StickerGoblin">StickerGoblin</option>
          <option value="Catmaxxer">Catmaxxer</option>
          <option value="DiscStamper">DiscStamper</option>
          <option value="PearlRdVibes">PearlRdVibes</option>
          <option value="OldBrooklynChaos">OldBrooklynChaos</option>
          <option value="TismHelpFan">TismHelpFan</option>
          <option value="FreeZineDroppa">FreeZineDroppa</option>
          <option value="custom">Custom name...</option>
        </select>
        
        <!-- Hidden custom name input -->
        <input id="custom-username" type="text" maxlength="20" placeholder="Type your custom name"
               class="hidden w-full mt-2 bg-zinc-800 border border-zinc-700 focus:border-pink-500 rounded-xl px-4 py-3 text-sm outline-none">
      </div>

      <!-- Sticker Grid -->
      <div id="sticker-grid" class="grid grid-cols-8 sm:grid-cols-10 gap-2 p-3 bg-zinc-800 rounded-2xl max-h-48 overflow-y-auto"></div>

      <!-- Preview + Send -->
      <div class="flex items-center gap-3">
        <div id="preview" class="w-20 h-20 flex-shrink-0 flex items-center justify-center text-7xl bg-zinc-800 rounded-2xl"></div>
        <button onclick="sendSticker()" id="send-btn"
                class="flex-1 bg-pink-600 hover:bg-pink-500 disabled:bg-zinc-700 disabled:text-zinc-400 font-semibold py-4 rounded-2xl text-lg transition">
          DROP STICKER
        </button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tlbchiqxbtqejlyhgwcz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsYmNoaXF4YnRxZWpseWhnd2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzIyOTcsImV4cCI6MjA5ODQ0ODI5N30.u8OrP8RPBbR5bAGLxWmzG2yQU_ywmUU4DvQU4kkZQjY';

    const stickers = [
      'рЯУЦ','рЯУЪ','рЯЦ®пЄП','вЬВпЄП','рЯУ∞','рЯО®','рЯЦЉпЄП','рЯУЭ','рЯФЦ','рЯУМ',
      'рЯТї','рЯЦ•пЄП','рЯУ±','рЯФІ','рЯТЊ','рЯРІ','вЪЩпЄП','рЯМР',
      'рЯР±','рЯШЇ','рЯШЄ','рЯЩА','рЯШЉ','рЯРЊ',
      'рЯМЖ','рЯПЩпЄП','рЯФ•','рЯТѓ','рЯСЊ','рЯЪА','рЯМЯ','вЭ§пЄП','рЯСН','рЯСП',
      'рЯШВ','рЯ•≥','рЯ§©','рЯШО','рЯ§Ш','рЯОЙ','рЯНД','рЯ¶Л'
    ];

    let supabaseClient;
    let selectedSticker = null;
    let lastSent = 0;

    function initSupabase() {
      const { createClient } = supabase;
      supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function renderStickers() {
      const grid = document.getElementById('sticker-grid');
      grid.innerHTML = '';
      stickers.forEach(sticker => {
        const btn = document.createElement('button');
        btn.className = 'sticker-btn text-4xl p-2 hover:bg-zinc-700 rounded-xl aspect-square flex items-center justify-center';
        btn.textContent = sticker;
        btn.onclick = () => selectSticker(sticker, btn);
        grid.appendChild(btn);
      });
    }

    function selectSticker(sticker, btn) {
      selectedSticker = sticker;
      document.getElementById('preview').textContent = sticker;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      updateSendButton();
    }

    function getUsername() {
      const select = document.getElementById('username-select');
      const customInput = document.getElementById('custom-username');

      if (select.value === 'custom') {
        return customInput.value.trim();
      } else {
        return select.value;
      }
    }

    function updateSendButton() {
      const btn = document.getElementById('send-btn');
      const username = getUsername();
      btn.disabled = !selectedSticker || !username || username.length < 2;
    }

    // Show/hide custom name input
    document.getElementById('username-select').addEventListener('change', function() {
      const customInput = document.getElementById('custom-username');
      if (this.value === 'custom') {
        customInput.classList.remove('hidden');
        customInput.focus();
      } else {
        customInput.classList.add('hidden');
        customInput.value = '';
      }
      updateSendButton();
    });

    function createMessage(msg) {
      const div = document.createElement('div');
      div.className = 'flex items-start gap-3 bg-zinc-900 rounded-2xl p-4';
      const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="px-3 py-0.5 bg-zinc-700 text-xs font-mono rounded-full text-pink-300">${msg.username}</span>
            <span class="text-xs text-zinc-500">${time}</span>
          </div>
          <div class="text-6xl leading-none">${msg.sticker}</div>
        </div>
      `;
      return div;
    }

    async function loadMessages() {
      const { data } = await supabaseClient
        .from('sticker_messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(100);
      
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (data) data.forEach(m => container.appendChild(createMessage(m)));
      container.scrollTop = container.scrollHeight;
    }

    function appendMessage(msg) {
      const container = document.getElementById('messages');
      container.appendChild(createMessage(msg));
      container.scrollTop = container.scrollHeight;
    }

    function setupRealtime() {
      supabaseClient
        .channel('stickers')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sticker_messages' }, 
            payload => appendMessage(payload.new))
        .subscribe();
    }

    async function sendSticker() {
      const now = Date.now();
      if (now - lastSent < 3500) {
        alert("Slow down sticker legend вАФ wait a couple seconds.");
        return;
      }

      const username = getUsername();

      if (!username || username.length < 2 || username.length > 20) {
        alert("Please choose a valid name.");
        return;
      }

      if (!selectedSticker) return;

      const { error } = await supabaseClient
        .from('sticker_messages')
        .insert({ username, sticker: selectedSticker });

      if (error) {
        console.error("Error:", error);
        alert("Error sending sticker: " + error.message);
      } else {
        lastSent = now;
      }
    }

    function init() {
      initSupabase();
      renderStickers();

      const select = document.getElementById('username-select');
      const customInput = document.getElementById('custom-username');

      select.addEventListener('change', updateSendButton);
      customInput.addEventListener('input', updateSendButton);

      loadMessages();
      setupRealtime();

      console.log('%c[Zine Sticker Chat] Ready with restricted names!', 'color:#ec4899');
    }

    window.onload = init;
  </script>
</body>
</html>
