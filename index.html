<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zine Sticker Drop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .sticker-btn { transition: transform 0.1s; }
    .sticker-btn:hover { transform: scale(1.15); }
    .sticker-btn.selected { outline: 3px solid #ec4899; outline-offset: 2px; background-color: #27251f; }
    #messages { scrollbar-width: thin; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-2xl mx-auto flex flex-col h-screen">
    <!-- Header -->
    <div class="bg-zinc-900 border-b border-zinc-700 p-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold">📖 Zine Sticker Drop</h1>
        <p class="text-xs text-zinc-400">Emojis only • Send multiple at once</p>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-zinc-950"></div>

    <!-- Compose -->
    <div class="bg-zinc-900 border-t border-zinc-700 p-4 space-y-4">

      <!-- Emoji Username -->
      <div>
        <input id="username" type="text" maxlength="30" 
               placeholder="Your name (emojis only, e.g. 🐱📖)"
               class="w-full bg-zinc-800 border border-zinc-700 focus:border-pink-500 rounded-xl px-4 py-3 text-sm outline-none">
        <p class="text-[10px] text-zinc-500 mt-1">Use only emojis for your name</p>
      </div>

      <!-- Sticker Grid (Multi-select) -->
      <div>
        <p class="text-xs text-zinc-400 mb-2">Select one or more stickers:</p>
        <div id="sticker-grid" class="grid grid-cols-8 sm:grid-cols-10 gap-2 p-3 bg-zinc-800 rounded-2xl max-h-48 overflow-y-auto"></div>
      </div>

      <!-- Preview -->
      <div id="preview" class="min-h-[70px] flex flex-wrap items-center gap-2 p-3 bg-zinc-800 rounded-2xl text-5xl"></div>

      <!-- Send Button -->
      <button onclick="sendSticker()" id="send-btn"
              class="w-full bg-pink-600 hover:bg-pink-500 disabled:bg-zinc-700 disabled:text-zinc-400 font-semibold py-4 rounded-2xl text-lg transition">
        DROP STICKERS
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tlbchiqxbtqejlyhgwcz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsYmNoaXF4YnRxZWpseWhnd2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzIyOTcsImV4cCI6MjA5ODQ0ODI5N30.u8OrP8RPBbR5bAGLxWmzG2yQU_ywmUU4DvQU4kkZQjY';

    const stickers = [
      '📖','📚','🖨️','✂️','📰','🎨','🖼️','📝','🔖','📌',
      '💻','🖥️','📱','🔧','💾','🐧','⚙️','🌐',
      '🐱','😺','😸','🙀','😼','🐾',
      '🌆','🏙️','🔥','💯','👾','🚀','🌟','❤️','👍','👏',
      '😂','🥳','🤩','😎','🤘','🎉','🍄','🦋'
    ];

    let supabaseClient;
    let selectedStickers = [];

    function initSupabase() {
      const { createClient } = supabase;
      supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function renderStickers() {
      const grid = document.getElementById('sticker-grid');
      grid.innerHTML = '';
      stickers.forEach(sticker => {
        const btn = document.createElement('button');
        btn.className = 'sticker-btn text-4xl p-2 hover:bg-zinc-700 rounded-xl aspect-square flex items-center justify-center';
        btn.textContent = sticker;
        btn.onclick = () => toggleSticker(sticker, btn);
        grid.appendChild(btn);
      });
    }

    function toggleSticker(sticker, btn) {
      if (selectedStickers.includes(sticker)) {
        selectedStickers = selectedStickers.filter(s => s !== sticker);
        btn.classList.remove('selected');
      } else {
        selectedStickers.push(sticker);
        btn.classList.add('selected');
      }
      updatePreview();
      updateSendButton();
    }

    function updatePreview() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      if (selectedStickers.length === 0) {
        preview.innerHTML = '<span class="text-zinc-500 text-sm">Selected stickers will appear here</span>';
        return;
      }
      selectedStickers.forEach(s => {
        const span = document.createElement('span');
        span.textContent = s;
        preview.appendChild(span);
      });
    }

    function updateSendButton() {
      const btn = document.getElementById('send-btn');
      const username = document.getElementById('username').value.trim();
      btn.disabled = selectedStickers.length === 0 || !username;
    }

    function createMessage(msg) {
      const div = document.createElement('div');
      div.className = 'flex items-start gap-3 bg-zinc-900 rounded-2xl p-4';
      const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <span class="px-3 py-0.5 bg-zinc-700 text-xs font-mono rounded-full text-pink-300">${msg.username}</span>
            <span class="text-xs text-zinc-500">${time}</span>
          </div>
          <div class="text-5xl leading-none flex flex-wrap gap-1">${msg.sticker}</div>
        </div>
      `;
      return div;
    }

    async function loadMessages() {
      const { data } = await supabaseClient
        .from('sticker_messages')
        .select('*')
        .order('created_at', { ascending: true })
        .limit(100);
      
      const container = document.getElementById('messages');
      container.innerHTML = '';
      if (data) data.forEach(m => container.appendChild(createMessage(m)));
      container.scrollTop = container.scrollHeight;
    }

    function appendMessage(msg) {
      const container = document.getElementById('messages');
      container.appendChild(createMessage(msg));
      container.scrollTop = container.scrollHeight;
    }

    function setupRealtime() {
      supabaseClient
        .channel('stickers')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sticker_messages' }, 
            payload => appendMessage(payload.new))
        .subscribe();
    }

    async function sendSticker() {
      const username = document.getElementById('username').value.trim();

      if (!username) {
        alert("Please enter an emoji name.");
        return;
      }

      // Basic check: warn if it looks like it has too many normal letters
      if (/[a-zA-Z0-9]/.test(username) && username.length > 3) {
        if (!confirm("Your name has letters/numbers. Continue anyway?")) {
          return;
        }
      }

      if (selectedStickers.length === 0) return;

      const combined = selectedStickers.join(''); // Combine all selected into one message

      const { error } = await supabaseClient
        .from('sticker_messages')
        .insert({ username, sticker: combined });

      if (error) {
        console.error(error);
        alert("Error: " + error.message);
      } else {
        // Clear selection after sending
        selectedStickers = [];
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('preview').innerHTML = '<span class="text-zinc-500 text-sm">Selected stickers will appear here</span>';
        updateSendButton();
      }
    }

    function init() {
      initSupabase();
      renderStickers();

      const usernameInput = document.getElementById('username');
      usernameInput.addEventListener('input', updateSendButton);

      // Live validation hint
      usernameInput.addEventListener('input', () => {
        if (/[a-zA-Z0-9]/.test(usernameInput.value)) {
          usernameInput.style.borderColor = '#f59e0b'; // orange warning
        } else {
          usernameInput.style.borderColor = '';
        }
      });

      loadMessages();
      setupRealtime();

      console.log('%c[Zine Sticker Chat] Emoji names + multi-sticker mode ready!', 'color:#ec4899');
    }

    window.onload = init;
  </script>
</body>
</html>
